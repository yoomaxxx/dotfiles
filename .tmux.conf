#!/usr/bin/env bash
set -a terminal-features 'xterm-256color:RGB'
set -g mouse on
bind-key x kill-pane
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'sh "~redis-tui" ~"btop" "~/home/maksim/.bun/bin/opencode" "~uv run" docker-compose'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'spywhere/tmux-named-snapshot'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'noscript/tmux-mighty-scroll'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set-option -g @pane_resize "10"
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-yank'

bind c new-window -c "#{pane_current_path}"
bind t new-window
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g mode-style "fg=#3c3d3e,bg=#d5c4a1"

set -g message-style "fg=#79740e,bg=#ebdbb2"

set -g message-command-style "fg=#076678,bg=#d5c4a1"

set -g pane-border-style "fg=#d5c4a1"
set -g pane-active-border-style "fg=#076678"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#076678,bg=#ebdbb2"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#fbf1c7,bg=#076678,bold] #S #[fg=#076678,bg=#ebdbb2,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#ebdbb2,bg=#ebdbb2,nobold,nounderscore,noitalics]#[fg=#076678,bg=#ebdbb2] #{prefix_highlight} #[fg=#d5c4a1,bg=#ebdbb2,nobold,nounderscore,noitalics]#[fg=#7c6f64,bg=#d5c4a1] %Y-%m-%d  %I:%M %p #[fg=#076678,bg=#d5c4a1,nobold,nounderscore,noitalics]#[fg=#fbf1c7,bg=#076678,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#ebdbb2,bg=#ebdbb2,nobold,nounderscore,noitalics]#[fg=#076678,bg=#ebdbb2] #{prefix_highlight} #[fg=#d5c4a1,bg=#ebdbb2,nobold,nounderscore,noitalics]#[fg=#7c6f64,bg=#d5c4a1] %Y-%m-%d  %H:%M #[fg=#076678,bg=#d5c4a1,nobold,nounderscore,noitalics]#[fg=#fbf1c7,bg=#076678,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#7c6f64,bg=#ebdbb2"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#7c6f64,bg=#d5c4a1"
setw -g window-status-format "#[fg=#ebdbb2,bg=#d5c4a1,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#d5c4a1,bg=#ebdbb2,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#ebdbb2,bg=#7c6f64,nobold,nounderscore,noitalics]#[fg=#ebdbb2,bg=#7c6f64,bold] #I  #W #F #[fg=#7c6f64,bg=#ebdbb2,nobold,nounderscore,noitalics]"


# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#B57614]#[bg=#ebdbb2]#[fg=#ebdbb2]#[bg=#B97614]"
set -g @prefix_highlight_output_suffix ""

set -g @prefix_highlight_prefix_prompt ' Ctrl+b '

run '~/.tmux/plugins/tpm/tpm'
